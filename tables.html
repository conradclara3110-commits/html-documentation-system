<h1>HTML Tables</h1>
<p>Tables are used to organize data into columns and rows.</p>
<table border="1">
  <tr>
    <th>Name</th>
    <th>Age</th>
    <th>Country</th>
  </tr>

  <tr>
    <td>Alice</td>
    <td>23</td>
    <td>Canada</td>
  </tr>

  <tr>
    <td>Romeo</td>
    <td>25</td>
    <td>Kenya</td>
  </tr>

</table>
